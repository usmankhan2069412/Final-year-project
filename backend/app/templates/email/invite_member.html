<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Team Invitation</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #fcfcf9; padding: 40px 20px; margin: 0;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px; background-color: #ffffff; border: 1px solid rgba(28, 28, 30, 0.05); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 12px rgba(28, 28, 30, 0.03);">
        <tr>
            <td style="padding: 40px; text-align: center; background-color: #1c1c1e;">
                <h1 style="color: #fbfbf2; margin: 0; font-size: 28px; font-weight: 700; font-family: 'Playfair Display', serif;">Aina</h1>
            </td>
        </tr>
        <tr>
            <td style="padding: 40px;">
                <h2 style="color: #1c1c1e; font-size: 20px; font-weight: 600; margin-top: 0;">You've Been Invited</h2>
                <p style="color: rgba(28, 28, 30, 0.6); font-size: 15px; line-height: 1.6; margin-bottom: 24px;">
                    You have been invited to join an organization on Aina. Click the button below to sign up and join your team.
                </p>
                <div style="text-align: center; margin: 32px 0;">
                    <a href="{{ invite_link }}" style="background-color: #EBDCFF; color: #1c1c1e; padding: 14px 28px; border-radius: 12px; font-weight: bold; text-decoration: none; font-size: 15px; display: inline-block;">
                        Accept Invitation
                    </a>
                </div>
                <p style="color: rgba(28, 28, 30, 0.4); font-size: 13px; line-height: 1.6;">
                    If you did not expect this invitation, you can safely ignore this email.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
